name: Build and Release

# v로 시작하는 태그(v1.0.0 등)를 push하면 자동 실행
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # 릴리스 생성/자산 업로드 권한

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: exe 빌드
        run: pyinstaller --onefile --windowed --name "WOS-Calculator" --icon "icon.ico" --add-data "icon.ico;." main.py --noconfirm

      - name: 릴리스 생성 및 exe 첨부
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WOS-Calculator.exe
